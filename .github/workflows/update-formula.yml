name: Update Limpet formula

# Bumps Formula/limpet.rb when georgeolaru/limpet cuts a release.
#  - Run it by hand (optionally pin a tag), or
#  - let the daily schedule catch new releases automatically.
# No cross-repo secret needed: it reads Limpet's public releases and writes to
# this tap with the built-in GITHUB_TOKEN. For instant updates, have the limpet
# release workflow call `gh workflow run update-formula.yml -R georgeolaru/homebrew-tap`
# with a PAT — but the schedule below already keeps it current within a day.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to pin (e.g. v1.2.0). Leave empty for the latest release."
        required: false
        type: string
  schedule:
    - cron: "17 7 * * *" # daily catch-up

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump formula to the target release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/update_formula.py ${{ inputs.tag && format('--tag {0}', inputs.tag) || '' }}

      - name: Commit if changed
        run: |
          if git diff --quiet -- Formula/limpet.rb; then
            echo "Formula already up to date."
          else
            version=$(grep -oE 'version "[^"]+"' Formula/limpet.rb | head -1 | cut -d'"' -f2)
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "limpet: bump to v${version}"
            git push
          fi
